<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Reset Password Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-auth">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Authentication</div>
        <h1>Reset Password Screen</h1>
        
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <strong>Recover access</strong>
<div class="field"><label>Registered Email or Phone</label><input type="text" placeholder="Enter email or phone" /></div>
          <div class="field"><label>New Password</label><input type="password" placeholder="Create new password" /></div>
          <div class="field"><label>Confirm New Password</label><input type="password" placeholder="Confirm new password" /></div>
        </div>
        <div class="actions"><a class="btn primary" href="#">Reset Password</a><a class="btn ghost" href="login.html">Back to Login</a></div>
      </section>
    
    </article>
  </main>
</body>
</html>
