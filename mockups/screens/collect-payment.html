<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Collect Payment Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-collector">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Collector</div>
        <h1>Collect Payment Screen</h1>
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <div class="row"><div><strong>Customer</strong><span>Nguyen Van Minh</span></div><div><strong>Bill Amount</strong><span>1.245.000 VND</span></div></div>
          <div class="row"><div class="field"><label>Collected Amount</label><input type="number" placeholder="Enter amount" /></div><div class="field"><label>Payment Method</label><select><option>Cash</option><option>GCash</option><option>Bank Transfer</option></select></div></div>
          <div class="field"><label>Payment Note</label><textarea placeholder="Optional note"></textarea></div>
        </div>
        <div class="actions"><a class="btn primary" href="#">Confirm Collection</a><a class="btn ghost" href="customer-details.html">Cancel</a></div>
        <div class="card"><strong>Receipt</strong></div>
      </section>
    
    </article>
  </main>
</body>
</html>
