<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Make Payment Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-customer">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Customer</div>
        <h1>Make Payment Screen</h1>
        
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <div class="row"><div><strong>Customer</strong><span>Nguyen Thi Lan</span></div><div><strong>Amount Due</strong><span>1.245.000 VND</span></div></div>
          <div class="field"><label>Payment Method</label><select><option>GCash</option><option>Bank Transfer</option><option>Cash</option></select></div>
          <div class="field"><label>Optional Payment Note</label><textarea placeholder="Add a note for this payment"></textarea></div>
        </div>
        <div class="actions"><a class="btn primary" href="#">Confirm Payment</a><a class="btn ghost" href="view-current-bill.html">Cancel</a></div>
        <div class="card"><strong>Payment result</strong></div>
      </section>
    
    </article>
  </main>
</body>
</html>
