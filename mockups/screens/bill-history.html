<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Bill History Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-customer">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Customer</div>
        <h1>Bill History Screen</h1>
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <strong>History</strong>
<div class="row">
            <div class="field"><label>Search</label><input type="text" placeholder="Search bills" /></div>
            <div class="field"><label>Status</label><select><option>All</option><option>Paid</option><option>Unpaid</option></select></div>
          </div>
        </div>
        <div class="list">
          <div class="list-item"><strong>May 2026 · 1.245.000 VND</strong><span>Chua thanh toan - Han 05/06/2026</span><a class="btn tiny ghost" href="#">Open Bill</a></div>
          <div class="list-item"><strong>April 2026 · 1.108.000 VND</strong><span>Da thanh toan - Co bien lai</span><a class="btn tiny ghost" href="#">Receipt</a></div>
          <div class="list-item"><strong>March 2026 · 1.032.000 VND</strong><span>Da thanh toan - Xem chi tiet</span><a class="btn tiny ghost" href="#">Open Bill</a></div>
        </div>
      </section>
    
    </article>
  </main>
</body>
</html>
