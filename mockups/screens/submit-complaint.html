<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Submit Complaint Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-customer">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Customer</div>
        <h1>Submit Complaint Screen</h1>
        
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <strong>Complaint form</strong>
<div class="field"><label>Complaint Type</label><select><option>Billing Issue</option><option>Meter Reading Issue</option><option>Water Supply Issue</option><option>Payment Issue</option></select></div>
          <div class="field"><label>Complaint Details</label><textarea placeholder="Describe the issue"></textarea></div>
        </div>
        <div class="actions"><a class="btn primary" href="#">Submit Complaint</a><a class="btn ghost" href="customer-dashboard.html">Cancel</a></div>
      </section>
    
    </article>
  </main>
</body>
</html>
