<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Login Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-auth">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Authentication</div>
        <h1>Login Screen</h1>
        
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <strong>Sign in</strong>
<div class="field"><label>Username or Email</label><input type="text" placeholder="Enter login identifier" /></div>
          <div class="field"><label>Password</label><input type="password" placeholder="Enter password" /></div>
        </div>
        <div class="actions"><a class="btn primary" href="#">Login</a><a class="btn ghost" href="register.html">Register</a></div>
        <a class="btn ghost" href="reset-password.html">Forgot Password</a>
        <div class="card error"><strong>Error message</strong></div>
      </section>
    
    </article>
  </main>
</body>
</html>
