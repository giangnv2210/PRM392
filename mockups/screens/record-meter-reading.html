<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Record Meter Reading Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-collector">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Collector</div>
        <h1>Record Meter Reading Screen</h1>
        
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <div class="row"><div><strong>Customer</strong><span>Nguyen Van Minh</span></div><div><strong>Meter No.</strong><span>WM-20841</span></div></div>
          <div class="row"><div><strong>Previous Reading</strong><span>982 m3</span></div><div><strong>Current Reading</strong><span>1.024 m3</span></div></div>
          <div class="field"><label>New Reading</label><input type="number" placeholder="Enter current meter reading" /></div>
          <div class="field"><label>Reading Note</label><textarea placeholder="Optional note about the reading"></textarea></div>
        </div>
        <div class="actions"><a class="btn primary" href="generate-bill.html">Continue</a><a class="btn ghost" href="customer-details.html">Cancel</a></div>
      </section>
    
    </article>
  </main>
</body>
</html>
