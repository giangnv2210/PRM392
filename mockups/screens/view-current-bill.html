<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - View Current Bill Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-customer">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Customer</div>
        <h1>View Current Bill Screen</h1>
        
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <div class="row"><div><strong>Billing Month</strong><span>Thang 5/2026</span></div><div><strong>Status</strong><span>Chua thanh toan</span></div></div>
          <div class="row"><div><strong>Meter Reading</strong><span>1.024 m3</span></div><div><strong>Due Date</strong><span>05/06/2026</span></div></div>
          <div class="grid-2"><div class="metric"><strong>Usage</strong><span>42 m3</span></div><div class="metric"><strong>Total</strong><span>1.245.000 VND</span></div></div>
        </div>
        <div class="card"><strong>Bill notes</strong></div>
        <div class="actions"><a class="btn primary" href="make-payment.html">Make Payment</a><a class="btn ghost" href="customer-dashboard.html">Back to Dashboard</a></div>
      </section>
    
    </article>
  </main>

</html>
