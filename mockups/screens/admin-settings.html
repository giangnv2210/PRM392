<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Admin Settings Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-admin">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Admin</div>
        <h1>Admin Settings Screen</h1>
      </header>
      
      <section class="section stack">
        <div class="card stack">
          <strong>Billing cycle and due date</strong>
          <div class="field"><label>Billing Cycle</label><input type="text" value="Monthly" /></div>
          <div class="field"><label>Due Date Rule</label><input type="text" value="Every 5th day" /></div>
        </div>
        <div class="card stack">
          <strong>Late fee and payment methods</strong>
          <div class="field"><label>Late Payment Fee</label><input type="text" value="5% of total due" /></div>
          <div class="field"><label>Supported Methods</label><input type="text" value="Cash, GCash, Bank Transfer" /></div>
        </div>
        <div class="card stack"><strong>Notification and security</strong></div>
        <div class="actions"><a class="btn primary" href="#">Save Settings</a><a class="btn ghost" href="admin-dashboard.html">Discard Changes</a></div>
      </section>
    
    </article>
  </main>
</body>
</html>
