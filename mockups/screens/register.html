<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Bill App - Register Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-auth">
  <main class="page">
    <article class="phone">
      <div class="status-bar"><span>9:41</span><span>LTE · 100%</span></div>
      <header class="app-bar">
        <a class="back-link" href="../index.html">Mockup index</a>
        <div class="kicker">Authentication</div>
        <h1>Register Screen</h1>
        
      </header>
      
      <section class="section stack">
        <div class="card accent stack">
          <strong>Create account</strong>
<div class="field"><label>Full Name</label><input type="text" placeholder="Enter full name" /></div>
          <div class="row">
            <div class="field"><label>Email</label><input type="email" placeholder="name@example.com" /></div>
            <div class="field"><label>Phone</label><input type="tel" placeholder="09xx xxx xxxx" /></div>
          </div>
          <div class="field"><label>Password</label><input type="password" placeholder="Create password" /></div>
          <div class="field"><label>Confirm Password</label><input type="password" placeholder="Confirm password" /></div>
        </div>
        <div class="actions"><a class="btn primary" href="#">Create Account</a><a class="btn ghost" href="login.html">Back to Login</a></div>
      </section>
    
    </article>
  </main>
</body>
</html>
